services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: roqet-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: roqet-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ROQET_EMBEDDER=hash
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/torch

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: roqet-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  qdrant_data:
  model_cache:
