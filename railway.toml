# Railway deployment configuration for Roqet API
# Deploy at: railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
# The image's CMD already binds uvicorn to $PORT; no startCommand needed.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# The API container is slim (fastembed ONNX model only); vectors live in managed
# Qdrant. REQUIRED variables (set in the Variables tab):
#   QDRANT_URL      your managed Qdrant endpoint (e.g. Qdrant Cloud)
#   QDRANT_API_KEY  its API key
# Optional:
#   CORS_ORIGINS    comma-separated allowed origins (set to your Vercel URL)
#   FASTEMBED_MODEL swap the ONNX model (must match how the index was built)
# Index the cluster once with ./scripts/index_cloud.sh before deploying.
